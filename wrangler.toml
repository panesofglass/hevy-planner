name = "hevy-planner"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "public"

[[d1_databases]]
binding = "DB"
database_name = "hevy-planner"
database_id = "856703c5-ee18-43c5-b910-4ee8f27742f4"

[durable_objects]
bindings = [
  { name = "SESSION_ACTOR", class_name = "SessionActor" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionActor"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[vars]
ENVIRONMENT = "development"

# Rate limiting: Configure Cloudflare Rate Limiting rules for /api/webhooks/hevy
# Recommended: 10 requests per minute per IP
# See: https://developers.cloudflare.com/waf/rate-limiting-rules/

# Production deploy: wrangler deploy --env production
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "hevy-planner"
database_id = "856703c5-ee18-43c5-b910-4ee8f27742f4"
[env.production.durable_objects]
bindings = [
  { name = "SESSION_ACTOR", class_name = "SessionActor" }
]
[env.production.vars]
ENVIRONMENT = "production"
