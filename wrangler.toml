name = "hevy-planner"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "public"

[[d1_databases]]
binding = "DB"
database_name = "hevy-planner"
database_id = "local"

[vars]
ENVIRONMENT = "production"

# Local dev overrides (wrangler dev uses .dev.vars or --env dev)
[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
